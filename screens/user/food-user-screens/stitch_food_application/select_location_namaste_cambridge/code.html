<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Select Location - Namaste Cambridge</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Be_Vietnam_Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#4c3e00",
              "on-secondary-fixed-variant": "#3d4756",
              "secondary": "#555f6f",
              "surface-container": "#edeeef",
              "error-container": "#ffdad6",
              "surface-tint": "#c0000a",
              "inverse-primary": "#ffb4aa",
              "primary-container": "#e2241f",
              "background": "#f8f9fa",
              "primary": "#bc000a",
              "on-surface-variant": "#5d3f3b",
              "on-secondary": "#ffffff",
              "tertiary-fixed-dim": "#e9c400",
              "surface-container-lowest": "#ffffff",
              "on-background": "#191c1d",
              "surface-variant": "#e1e3e4",
              "outline-variant": "#e7bdb7",
              "surface": "#f8f9fa",
              "on-secondary-container": "#596373",
              "on-error-container": "#93000a",
              "surface-dim": "#d9dadb",
              "surface-container-low": "#f3f4f5",
              "on-tertiary-fixed": "#221b00",
              "outline": "#926f6a",
              "on-primary-container": "#fffbff",
              "on-primary-fixed": "#410001",
              "tertiary-container": "#caa900",
              "secondary-fixed-dim": "#bdc7d9",
              "secondary-fixed": "#d9e3f6",
              "secondary-container": "#d6e0f3",
              "on-surface": "#191c1d",
              "surface-container-highest": "#e1e3e4",
              "on-tertiary-fixed-variant": "#554600",
              "on-primary-fixed-variant": "#930005",
              "on-primary": "#ffffff",
              "tertiary-fixed": "#ffe171",
              "surface-container-high": "#e7e8e9",
              "inverse-on-surface": "#f0f1f2",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed": "#121c2a",
              "inverse-surface": "#2e3132",
              "tertiary": "#705d00",
              "error": "#ba1a1a",
              "primary-fixed": "#ffdad5",
              "on-error": "#ffffff",
              "primary-fixed-dim": "#ffb4aa",
              "surface-bright": "#f8f9fa"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1rem", "2xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pattern-bg {
            background-color: transparent;
            background-image: radial-gradient(#bc000a 0.5px, transparent 0.5px), radial-gradient(#bc000a 0.5px, #ffffff 0.5px);
            background-size: 20px 20px;
            background-position: 0 0,10px 10px;
            opacity: 0.03;
        }
        .editorial-shadow {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04), 0 4px 12px -4px rgba(0, 0, 0, 0.02);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased selection:bg-primary/10">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 backdrop-blur-xl shadow-sm shadow-black/5 flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="hover:bg-slate-200/50 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-red-600" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl text-red-600">Select Location</h1>
</div>
<button class="hover:bg-slate-200/50 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-slate-500" data-icon="account_circle">account_circle</span>
</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto relative min-h-screen">
<!-- Editorial Background Pattern -->
<div class="fixed inset-0 pattern-bg pointer-events-none z-0"></div>
<!-- Hero Content -->
<section class="relative z-10 mb-10">
<span class="text-primary font-bold tracking-widest text-xs uppercase mb-3 block">Welcome to Namaste Cambridge</span>
<h2 class="font-headline text-4xl font-extrabold text-on-background leading-tight -tracking-wider">
                Where are you <br/>ordering from?
            </h2>
<p class="text-secondary mt-4 text-lg font-medium">Select your nearest region to view the local menu and delivery options.</p>
</section>
<!-- Location Cards Grid -->
<div class="grid gap-6 relative z-10">
<!-- Location 1: Cambridge -->
<button class="group w-full text-left bg-surface-container-lowest p-6 rounded-2xl editorial-shadow hover:bg-surface-container-low transition-all duration-300 active:scale-[0.98]">
<div class="flex justify-between items-start mb-4">
<div class="p-3 bg-primary/5 rounded-2xl group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="location_city">location_city</span>
</div>
<span class="bg-primary-container text-on-primary-container text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full">Collection &amp; Delivery</span>
</div>
<h3 class="font-headline text-2xl font-bold text-on-background mb-2">Cambridge</h3>
<p class="text-secondary text-sm leading-relaxed mb-4">
                    If you are unsure or your area is not listed, please choose Cambridge (our base location).
                </p>
<div class="flex items-center text-primary font-bold text-sm">
<span>Explore Menu</span>
<span class="material-symbols-outlined ml-2 text-lg group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<!-- Location 2: Peterborough -->
<button class="group w-full text-left bg-surface-container-lowest p-6 rounded-2xl editorial-shadow hover:bg-surface-container-low transition-all duration-300 active:scale-[0.98]">
<div class="flex justify-between items-start mb-4">
<div class="p-3 bg-secondary-container/30 rounded-2xl group-hover:bg-secondary-container/50 transition-colors">
<span class="material-symbols-outlined text-secondary text-3xl" data-icon="delivery_dining">delivery_dining</span>
</div>
<span class="bg-surface-container-highest text-secondary text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full border border-outline-variant/20">Delivery Only</span>
</div>
<h3 class="font-headline text-2xl font-bold text-on-background mb-2">Peterborough</h3>
<div class="bg-tertiary-fixed/40 p-3 rounded-xl mb-4 flex gap-3 items-start">
<span class="material-symbols-outlined text-on-tertiary-fixed-variant text-lg mt-0.5" data-icon="schedule">schedule</span>
<p class="text-on-tertiary-fixed-variant text-xs font-semibold leading-normal">
                        Limited menu after 5pm. Order by 5pm for the full menu.
                    </p>
</div>
<div class="flex items-center text-primary font-bold text-sm">
<span>Explore Menu</span>
<span class="material-symbols-outlined ml-2 text-lg group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<!-- Location 3: Hertfordshire and Luton -->
<button class="group w-full text-left bg-surface-container-lowest p-6 rounded-2xl editorial-shadow hover:bg-surface-container-low transition-all duration-300 active:scale-[0.98]">
<div class="flex justify-between items-start mb-4">
<div class="p-3 bg-secondary-container/30 rounded-2xl group-hover:bg-secondary-container/50 transition-colors">
<span class="material-symbols-outlined text-secondary text-3xl" data-icon="map">map</span>
</div>
<span class="bg-surface-container-highest text-secondary text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full border border-outline-variant/20">Delivery Only</span>
</div>
<h3 class="font-headline text-2xl font-bold text-on-background mb-2">Hertfordshire and Luton</h3>
<p class="text-secondary text-xs leading-relaxed mb-4 font-medium opacity-80">
                    Includes: Luton, Royston, Hitchin, Stevenage, Letchworth, Baldock and nearby towns.
                </p>
<div class="bg-tertiary-fixed/40 p-3 rounded-xl mb-4 flex gap-3 items-start">
<span class="material-symbols-outlined text-on-tertiary-fixed-variant text-lg mt-0.5" data-icon="warning">warning</span>
<p class="text-on-tertiary-fixed-variant text-xs font-semibold leading-normal">
                        Limited menu after 5pm. Order by 5pm for the full menu.
                    </p>
</div>
<div class="flex items-center text-primary font-bold text-sm">
<span>Explore Menu</span>
<span class="material-symbols-outlined ml-2 text-lg group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
</button>
</div>
<!-- Help Section -->
<section class="mt-12 text-center relative z-10 px-4">
<p class="text-slate-500 text-sm mb-4 font-medium">Don't see your location?</p>
<button class="inline-flex items-center gap-2 text-primary font-bold px-6 py-3 rounded-full hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined" data-icon="contact_support">contact_support</span>
<span>Contact Support</span>
</button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-xl z-50 rounded-t-3xl shadow-[0_-8px_24px_rgba(0,0,0,0.04)]">
<a class="flex flex-col items-center justify-center text-slate-400 px-4 py-2 hover:text-red-500 active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="restaurant_menu">restaurant_menu</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-semibold uppercase tracking-wider">Menu</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 px-4 py-2 hover:text-red-500 active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="receipt_long">receipt_long</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-semibold uppercase tracking-wider">Orders</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 px-4 py-2 hover:text-red-500 active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="local_offer">local_offer</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-semibold uppercase tracking-wider">Offers</span>
</a>
<a class="flex flex-col items-center justify-center bg-red-50 text-red-600 rounded-2xl px-4 py-2 active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] font-semibold uppercase tracking-wider">Profile</span>
</a>
</nav>
<!-- Visual Anchor for Editorial Layout -->
<div class="fixed top-1/2 -right-24 w-64 h-64 bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-0 -left-24 w-64 h-64 bg-tertiary-fixed/10 blur-[100px] rounded-full pointer-events-none"></div>
</body></html>
