<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Culinary Editorial - Premium Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be_Vietnam_Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#f8f9fa",
              "primary-container": "#e2241f",
              "primary-fixed-dim": "#ffb4aa",
              "secondary-fixed-dim": "#bdc7d9",
              "on-primary-fixed-variant": "#930005",
              "on-secondary-fixed-variant": "#3d4756",
              "outline-variant": "#e7bdb7",
              "on-secondary-fixed": "#121c2a",
              "error-container": "#ffdad6",
              "secondary": "#555f6f",
              "surface": "#f8f9fa",
              "surface-tint": "#c0000a",
              "tertiary-fixed": "#ffe171",
              "primary": "#bc000a",
              "tertiary": "#705d00",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#d9e3f6",
              "surface-bright": "#f8f9fa",
              "surface-container-low": "#f3f4f5",
              "on-error": "#ffffff",
              "on-tertiary-container": "#4c3e00",
              "inverse-on-surface": "#f0f1f2",
              "on-secondary-container": "#596373",
              "surface-dim": "#d9dadb",
              "on-surface-variant": "#5d3f3b",
              "on-primary-fixed": "#410001",
              "on-primary-container": "#fffbff",
              "surface-variant": "#e1e3e4",
              "surface-container-high": "#e7e8e9",
              "tertiary-container": "#caa900",
              "on-tertiary-fixed": "#221b00",
              "on-tertiary-fixed-variant": "#554600",
              "on-primary": "#ffffff",
              "on-tertiary": "#ffffff",
              "surface-container": "#edeeef",
              "outline": "#926f6a",
              "surface-container-highest": "#e1e3e4",
              "on-background": "#191c1d",
              "on-surface": "#191c1d",
              "primary-fixed": "#ffdad5",
              "on-secondary": "#ffffff",
              "inverse-primary": "#ffb4aa",
              "secondary-container": "#d6e0f3",
              "on-error-container": "#93000a",
              "tertiary-fixed-dim": "#e9c400",
              "inverse-surface": "#2e3132",
              "error": "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .editorial-shadow {
        box-shadow: 0 8px 24px rgba(25, 28, 29, 0.04);
      }
      .bg-signature-glow {
        background: linear-gradient(135deg, #bc000a 0%, #e2241f 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col items-center justify-center p-6">
<!-- Top Navigation Suppressed for Focused Journey (The "Semantic Shell" Mandate) -->
<div class="w-full max-w-md space-y-12">
<!-- Brand Header Section -->
<header class="text-center space-y-4">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-3xl editorial-shadow mb-2">
<span class="material-symbols-outlined text-on-primary-container text-3xl" data-icon="restaurant" style="">restaurant</span>
</div>
<h1 class="font-headline font-extrabold text-4xl tracking-tighter text-primary" style="">Nameste Cam</h1>
<p class="text-secondary font-medium tracking-tight" style="">Curation of extraordinary flavors.</p>
</header>
<!-- Main Auth Form Shell -->
<main class="bg-surface-container-lowest p-8 md:p-10 rounded-3xl editorial-shadow space-y-8 relative overflow-hidden">
<!-- Subtle Asymmetric Decorative Element -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-primary/5 rounded-full blur-3xl"></div>
<div class="space-y-2">
<h2 class="font-headline font-bold text-2xl text-on-surface" style="">Welcome back</h2>
<p class="text-secondary text-sm" style="">Sign in to your editorial account</p>
</div>
<form class="space-y-6">
<div class="space-y-4">
<!-- Email Field -->
<div class="group">
<label class="block text-xs font-bold uppercase tracking-widest text-secondary mb-2 ml-1" for="email" style="">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-secondary/60 text-xl" data-icon="mail" style="">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-zinc-400 transition-all outline-none" id="email" name="email" placeholder="gourmet@example.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="group">
<div class="flex justify-between items-center mb-2 ml-1">
<label class="block text-xs font-bold uppercase tracking-widest text-secondary" for="password" style="">Password</label>
<a class="text-[11px] font-bold text-primary hover:opacity-80 transition-opacity" href="#" style="">Forgot?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-secondary/60 text-xl" data-icon="lock" style="">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-none rounded-2xl focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-zinc-400 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password">
<button class="absolute right-4 text-secondary/60 hover:text-primary transition-colors" style="" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility" style="">visibility</span>
</button>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="w-full py-4 bg-signature-glow text-on-primary font-headline font-bold rounded-full editorial-shadow active:scale-95 transition-all duration-200" style="" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
<span class="text-[10px] font-bold uppercase tracking-widest text-zinc-400" style="">or</span>
<div class="h-[1px] flex-1 bg-surface-container-high"></div>
</div>
<!-- Secondary Actions -->
<div class="grid grid-cols-1 gap-4"><button class="w-full py-4 bg-white border border-surface-variant text-on-surface font-headline font-bold rounded-full flex items-center justify-center gap-3 active:scale-95 transition-all shadow-sm" type="button" style="">
<img alt="Google" class="h-5 w-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNxI22KEwngUQYEb2ZPIiftkoU0JkFF3eY04GpxRCK9h4oqFTcwys-U33o0PxUCSVNyn38xmHiFZwg-8qyVKsqKyTMDPrWTxkto0K6OHEBzYX1wmVvmZ2JPALuDVOGSzCvOgWlIBiN04W-tZWDgW8mOgiDfk2wpEfkcBs864RHY5c6GdXI6LThIwejyW4hDQwEf4jQOEqo30waYD1_7rRj3PfFTeuhghkDqcpIhzFne77tvd2JxQB6QU6eunPVNekapvM_SVUHYmo" style="">
  Continue with Google
</button>
<button class="w-full py-4 bg-[#1877F2] text-white font-headline font-bold rounded-full flex items-center justify-center gap-3 active:scale-95 transition-all shadow-sm" type="button" style="">
<svg class="h-5 w-5 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path></svg>
  Continue with Facebook
</button>
<button class="w-full py-4 bg-surface-container-high text-on-surface-variant font-headline font-bold rounded-full flex items-center justify-center gap-3 active:scale-95 transition-all" style="">
<span class="material-symbols-outlined text-xl" data-icon="explore" style="">explore</span>
                    Continue as Guest
                </button>
</div>
</main>
<!-- Footer Call-to-action -->
<footer class="text-center space-y-8">
<p class="text-sm text-secondary font-medium" style="">
                New to the editorial? 
                <a class="text-primary font-bold hover:underline ml-1" href="#" style="">Create an account</a>
</p>
</footer>
</div>
<!-- Background Decorative Elements (Visual Tokens from Design System) -->
<div class="fixed top-0 left-0 -z-10 w-full h-full overflow-hidden pointer-events-none">
<div class="absolute top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary-container/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[10%] -right-[10%] w-[30%] h-[30%] bg-tertiary-fixed/10 rounded-full blur-[100px]"></div>
</div>
</body></html>
